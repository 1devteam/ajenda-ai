# ============================================================
# Citadel (OmniPath v2) — Nginx Bootstrap Configuration
# Purpose: HTTP-only config used for initial Let's Encrypt cert issuance
# Usage:
#   1. docker compose ... up -d nginx  (with this config mounted)
#   2. certbot certonly --webroot -w /var/www/certbot -d nested-ai.net
#   3. Switch back to nginx.staging.conf and restart
# ============================================================
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    server {
        listen 80;
        listen [::]:80;
        server_name nested-ai.net www.nested-ai.net;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Temporary: proxy API directly over HTTP (for testing only)
        location /health {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }

        location / {
            return 200 '{"status":"bootstrapping","message":"SSL cert issuance in progress"}';
            add_header Content-Type application/json;
        }
    }
}
