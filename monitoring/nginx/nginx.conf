# ============================================================
# Omnipath v2 — Nginx Production Configuration
# Reverse proxy + SSL termination + security hardening
# Built with Pride for Obex Blackvault
# ============================================================

# ── Worker configuration ──────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Basic settings ────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version from error pages and headers
    server_tokens off;

    # Optimise file serving
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Timeouts
    keepalive_timeout     65;
    client_body_timeout   12;
    client_header_timeout 12;
    send_timeout          10;

    # Buffer sizes — prevent buffer overflow attacks
    client_body_buffer_size     16K;
    client_header_buffer_size   1k;
    client_max_body_size        8m;
    large_client_header_buffers 4 8k;

    # ── Logging ───────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────
    # General API rate limit: 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    # Auth endpoints: stricter — 10 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # Health check: unlimited
    limit_req_zone $binary_remote_addr zone=health_limit:1m rate=120r/m;

    # ── SSL session cache ─────────────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ── Upstream backend pool ─────────────────────────────────
    upstream omnipath_backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Allow Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # ── SSL/TLS ───────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern TLS configuration (Mozilla Intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security headers ──────────────────────────────────
        # Note: application also sets these; nginx provides defence-in-depth
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── Request ID ────────────────────────────────────────
        add_header X-Request-ID $request_id always;

        # ── Health check (no rate limit, no auth) ─────────────
        location = /health {
            limit_req zone=health_limit burst=20 nodelay;
            proxy_pass http://omnipath_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            access_log off;
        }

        # ── Metrics endpoint (internal only) ──────────────────
        location = /metrics {
            # Restrict to internal networks only
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://omnipath_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # ── Auth endpoints (strict rate limit) ────────────────
        location ~ ^/api/v1/(auth|tenants) {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://omnipath_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── API endpoints ─────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://omnipath_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ── Docs (development only — disable in production) ───
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://omnipath_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Block common attack paths ─────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Default: 404 for unknown paths ────────────────────
        location / {
            return 404;
        }
    }
}
