# ============================================================
# Citadel (OmniPath v2) — Nginx Production Configuration
# Domain: nested-ai.net
# SSL: Let's Encrypt via Certbot
# Built with Pride for Obex Blackvault
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout     65;
    client_body_timeout   12;
    client_header_timeout 12;
    send_timeout          10;

    client_body_buffer_size     16K;
    client_header_buffer_size   1k;
    client_max_body_size        8m;
    large_client_header_buffers 4 8k;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting zones
    # api_limit: 60 req/min general API traffic
    # auth_limit: 30 req/min for auth endpoints (staging — tighten for production)
    # health_limit: 120 req/min for health checks
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=health_limit:1m rate=120r/m;

    # JSON error pages for rate limiting and server errors
    map $status $error_body {
        429 '{"error":"rate_limit_exceeded","message":"Too many requests. Please slow down and try again.","status":429}';
        default '{"error":"server_error","message":"An unexpected error occurred.","status":$status}';
    }

    # Upstream backend pool
    upstream citadel_backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # HTTP → HTTPS redirect (also serves Certbot ACME challenge)
    server {
        listen 80;
        listen [::]:80;
        server_name nested-ai.net www.nested-ai.net;

        # Certbot ACME challenge — must remain HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check endpoint — responds on HTTP so Docker health check works
        # (avoids the HTTP→HTTPS redirect loop that breaks wget --spider)
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"nginx"}';
        }
        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name nested-ai.net www.nested-ai.net;

        # SSL certificate (issued by Certbot)
        ssl_certificate     /etc/letsencrypt/live/nested-ai.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nested-ai.net/privkey.pem;

        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security headers (full set with HSTS now that we have SSL)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Request-ID $request_id always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Health check
        location = /health {
            limit_req zone=health_limit burst=20 nodelay;
            proxy_pass http://citadel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # Metrics endpoint (internal use only)
        location = /metrics {
            proxy_pass http://citadel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # JSON error page for rate limiting (static file approach — works with limit_req_status)
        error_page 429 /errors/429.json;
        location = /errors/429.json {
            internal;
            default_type application/json;
            add_header Content-Type "application/json" always;
            add_header Retry-After 60 always;
            return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Please slow down and try again.","status":429}';
        }

        # GET /api/v1/auth/me — read-only, exempt from auth rate limit
        location = /api/v1/auth/me {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://citadel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Auth endpoints (rate limited — 30 req/min, burst 20 for staging)
        location ~ ^/api/v1/(auth|tenants) {
            limit_req zone=auth_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://citadel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # API endpoints
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://citadel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # API docs
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://citadel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Monitoring (protected by HTTP Basic Auth) ──────────────────────
        # Access: https://nested-ai.net/monitoring/grafana/
        #         https://nested-ai.net/monitoring/prometheus/
        #         https://nested-ai.net/monitoring/jaeger/
        # Credentials stored in /etc/nginx/.htpasswd on host

        location /monitoring/grafana/ {
            auth_basic "Citadel Monitoring";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Required for Grafana sub-path operation
            proxy_set_header X-Forwarded-Prefix /monitoring/grafana;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /monitoring/prometheus/ {
            auth_basic "Citadel Monitoring";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /monitoring/jaeger/ {
            auth_basic "Citadel Monitoring";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://jaeger:16686/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # ───────────────────────────────────────────────────────────────────

        # Block common attack paths
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Default
        location / {
            return 404;
        }
    }
}
