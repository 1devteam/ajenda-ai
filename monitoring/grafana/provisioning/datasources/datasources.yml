apiVersion: 1

datasources:
  # ── Prometheus: metrics ───────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST

  # ── Loki: logs ────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        # Link request_id in logs to Jaeger traces
        - datasourceUid: jaeger
          matcherRegex: '"request_id":"([^"]+)"'
          name: TraceID
          url: "$${__value.raw}"

  # ── Jaeger: traces ────────────────────────────────────────────────────────
  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
