services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/api.Dockerfile
    env_file:
      - .env.prod
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
      otel-collector:
        condition: service_started
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/app/deploy/scripts/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/worker.Dockerfile
    env_file:
      - .env.prod
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  migrate:
    build:
      context: ../..
      dockerfile: deploy/docker/migrate.Dockerfile
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ajenda
      POSTGRES_USER: ajenda
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ajenda -d ajenda"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:0.107.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../k8s/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
    restart: unless-stopped

volumes:
  postgres_data:
