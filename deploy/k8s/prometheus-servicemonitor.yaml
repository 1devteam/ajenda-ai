apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ajenda-api
  namespace: ajenda
spec:
  selector:
    matchLabels:
      app: ajenda-api
  namespaceSelector:
    matchNames:
      - ajenda
  endpoints:
    - port: http
      # The observability router is mounted under /v1/ by build_api_router().
      # Full path: /v1/observability/metrics
      # This endpoint is in the AuthContextMiddleware public-path allowlist
      # so no Authorization header is required for Prometheus scraping.
      path: /v1/observability/metrics
      interval: 15s
