apiVersion: batch/v1
kind: Job
metadata:
  name: ajenda-migrate
  namespace: ajenda
  labels:
    version: "1.1.0"
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          # Use immutable image tags in production — never :latest
          # Override via Kustomize or Helm values: image: ajenda/migrate:${GIT_SHA}
          image: ajenda/migrate:1.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ajenda-config
            - secretRef:
                name: ajenda-secrets
