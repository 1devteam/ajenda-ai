# Kubernetes Deployment for Omnipath v2 with Governance
# Built with Pride for Obex Blackvault

apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnipath-backend
  namespace: omnipath
  labels:
    app: omnipath
    component: backend
    version: v2.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: omnipath
      component: backend
  template:
    metadata:
      labels:
        app: omnipath
        component: backend
        version: v2.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: omnipath-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      initContainers:
      # Run database migrations before starting
      - name: migrations
        image: omnipath/backend:v2.0
        command: ["alembic", "upgrade", "head"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: omnipath-secrets
              key: database-url
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      
      containers:
      - name: backend
        image: omnipath/backend:v2.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        env:
        # Database
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: omnipath-secrets
              key: database-url
        
        # Redis
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: omnipath-secrets
              key: redis-url
        - name: REDIS_MAX_CONNECTIONS
          value: "50"
        
        # NATS
        - name: NATS_URL
          valueFrom:
            secretKeyRef:
              name: omnipath-secrets
              key: nats-url
        - name: NATS_ENABLED
          value: "true"
        
        # Security
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: omnipath-secrets
              key: jwt-secret
        - name: JWT_ALGORITHM
          value: "HS256"
        - name: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
          value: "60"
        
        # Rate Limiting
        - name: RATE_LIMIT_ENABLED
          value: "true"
        - name: RATE_LIMIT_PER_MINUTE
          value: "60"
        - name: RATE_LIMIT_PER_HOUR
          value: "1000"
        
        # Observability
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger-collector:4317"
        - name: PROMETHEUS_ENABLED
          value: "true"
        
        # Application
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        - name: LOG_LEVEL
          value: "INFO"
        
        # LLM
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: omnipath-secrets
              key: openai-api-key
        
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - omnipath
                - key: component
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: omnipath-backend
  namespace: omnipath
  labels:
    app: omnipath
    component: backend
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  selector:
    app: omnipath
    component: backend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omnipath-backend
  namespace: omnipath
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omnipath-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: omnipath-backend
  namespace: omnipath
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: omnipath
      component: backend
