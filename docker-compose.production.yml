# Production Docker Compose for Ajenda-AI
# Built with Pride – hardened for real SMB deployment
services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:15-alpine
    container_name: ajenda-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ajenda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ajenda}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    # NO ports published – internal network only
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ajenda}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ajenda-network

  # Redis (Caching & Governance Cache)
  redis:
    image: redis:7-alpine
    container_name: ajenda-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    # NO ports published
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ajenda-network

  # NATS (Event Bus & Governance Async Operations)
  nats:
    image: nats:2.10-alpine
    container_name: ajenda-nats-prod
    command:
      - "-js"
      - "-m"
      - "8222"
      - "--user"
      - "${NATS_USER:-ajenda}"
      - "--pass"
      - "${NATS_PASSWORD}"
    # NO ports published except internal
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8222/healthz"\]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ajenda-network

  # NATS Exporter (for Prometheus metrics – added for observability alignment)
  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.19.1
    container_name: ajenda-nats-exporter-prod
    command: ["-port", "7777", "-nats.server", "nats:4222"]
    depends_on:
      - nats
    restart: unless-stopped
    networks:
      - ajenda-network

  # Jaeger (Distributed Tracing)
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: ajenda-jaeger-prod
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    # NO ports published – internal only
    volumes:
      - jaeger_data:/badger
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:16686"\]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ajenda-network

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: ajenda-prometheus-prod
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    # NO ports published
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"\]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ajenda-network

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:10.2.3
    container_name: ajenda-grafana-prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    # NO ports published
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"\]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ajenda-network

  # Ajenda-AI Backend (Production)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: ajenda-backend-prod
    ports:
      - "${BACKEND_PORT:-8000}:8000"  # Keep backend exposed for now (nginx will proxy)
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-ajenda}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ajenda}
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_MAX_CONNECTIONS: 50
      # NATS
      NATS_URL: nats://${NATS_USER:-ajenda}:${NATS_PASSWORD}@nats:4222
      NATS_ENABLED: "true"
      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      PROMETHEUS_ENABLED: "true"
      # Security – CRITICAL FIX
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60
      # Rate Limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_PER_MINUTE: 60
      RATE_LIMIT_PER_HOUR: 1000
      # Application
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      # LLM (if needed)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"\]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - ajenda-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx (Reverse Proxy & Load Balancer) – Only public entry point
  nginx:
    image: nginx:alpine
    container_name: ajenda-nginx-prod
    ports:
      - "80:80"
      - "443:443"  # Only these are public
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./monitoring/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost/health"\]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ajenda-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
  jaeger_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  ajenda-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
