name: CI — Pull Request Gate

# Runs on every pull request and on direct pushes to main.
# All jobs must pass before a PR can be merged.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  # Test database — provided by the postgres service container below
  AJENDA_DATABASE_URL: "postgresql+psycopg://ajenda_test:ajenda_test@localhost:5432/ajenda_test"
  AJENDA_QUEUE_URL: "redis://localhost:6379/0"
  AJENDA_ENV: "test"
  AJENDA_LOG_LEVEL: "WARNING"
  AJENDA_LOG_JSON: "false"
  AJENDA_APP_NAME: "Ajenda AI Test"
  AJENDA_OIDC_ISSUER: ""
  AJENDA_OIDC_AUDIENCE: "ajenda-api"
  AJENDA_QUEUE_ADAPTER: "redis"
  AJENDA_RATE_LIMIT_REQUESTS: "10000"
  AJENDA_RATE_LIMIT_WINDOW_SECONDS: "60"
  AJENDA_REDACT_KEYS: "password,secret,token,api_key,authorization,cookie,set-cookie"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Static analysis — ruff lint + mypy type checking
  # Fast feedback, no infrastructure required.
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Ruff — lint
        run: ruff check backend/ tests/

      - name: Ruff — format check
        run: ruff format --check backend/ tests/

      - name: Mypy — type check
        run: mypy backend/

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Unit tests — no infrastructure, fast
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ tests/contract/ tests/deployment/ \
            -v \
            --tb=short \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not integration"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-unit
          path: coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Integration tests — real Postgres + Redis via service containers
  # ─────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ajenda_test
          POSTGRES_USER: ajenda_test
          POSTGRES_PASSWORD: ajenda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ajenda_test -d ajenda_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ \
            -v \
            --tb=short \
            -m "integration" \
            --timeout=60

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Migration safety — verify downgrade/upgrade round-trip
  # Catches migration regressions before they reach production.
  # ─────────────────────────────────────────────────────────────────────────
  migration-safety:
    name: Migration Round-Trip
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ajenda_test
          POSTGRES_USER: ajenda_test
          POSTGRES_PASSWORD: ajenda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ajenda_test -d ajenda_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Upgrade to head
        run: alembic upgrade head

      - name: Downgrade to base
        run: alembic downgrade base

      - name: Upgrade again (verify idempotency)
        run: alembic upgrade head

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Docker build — verify the image builds cleanly
  # Does not push; push is handled by the release workflow.
  # ─────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ajenda-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
