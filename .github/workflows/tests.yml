kname: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 💾 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎨 Check formatting (black)
        run: |
          black --check --line-length 100 backend/ tests/

      - name: 🔍 Lint (flake8)
        run: |
          flake8 backend/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --count \
            --statistics

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 💾 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔧 Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: 🔬 Type check (mypy)
        continue-on-error: true
        run: |
          mypy backend/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --warn-unused-ignores \
            --show-error-codes \
            2>&1 | tail -30

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 💾 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🛡️ Static security scan (bandit)
        continue-on-error: true
        run: |
          bandit -r backend/ \
            --severity-level medium \
            --confidence-level medium \
            -f txt \
            2>&1 | tail -40

      - name: 🔒 Dependency vulnerability scan (safety)
        continue-on-error: true
        run: |
          safety scan --output text 2>&1 | tail -40

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 💾 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-json-report

      - name: 🔧 Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: 🧪 Run unit tests
        run: |
          pytest -v -m unit \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --json-report \
            --json-report-file=test-results.json \
            --tb=short

      - name: 🔗 Run integration tests
        continue-on-error: true
        timeout-minutes: 5
        run: |
          pytest -v -m integration \
            --cov=backend \
            --cov-append \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: omnipath-coverage
          fail_ci_if_error: false

      - name: 📋 Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.json
          retention-days: 30

      - name: ✅ Test Summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, sys, os

          try:
              with open("test-results.json") as f:
                  data = json.load(f)

              summary  = data.get("summary", {})
              passed   = summary.get("passed", 0)
              failed   = summary.get("failed", 0)
              errors   = summary.get("error", 0)
              skipped  = summary.get("skipped", 0)
              total    = summary.get("total", 0)
              duration = data.get("duration", 0)

              lines = [
                  "## 🧪 Test Results",
                  "",
                  "| Result     | Count |",
                  "|------------|-------|",
                  f"| ✅ Passed  | {passed} |",
                  f"| ❌ Failed  | {failed} |",
                  f"| 💥 Errors  | {errors} |",
                  f"| ⏭️ Skipped | {skipped} |",
                  f"| **Total**  | **{total}** |",
                  "",
                  f"⏱️ Duration: {duration:.2f}s",
              ]

              if failed > 0 or errors > 0:
                  lines += ["", "### ❌ Failed Tests"]
                  for test in data.get("tests", []):
                      if test.get("outcome") in ("failed", "error"):
                          lines.append(f"- `{test['nodeid']}`")

              output = "\n".join(lines)
              print(output)

              step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
              if step_summary:
                  with open(step_summary, "a") as f:
                      f.write(output + "\n")

              if failed > 0 or errors > 0:
                  sys.exit(1)

          except FileNotFoundError:
              print("test-results.json not found — tests may not have run")
          EOF

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: omnipath:${{ github.sha }}
      - name: 🔍 Scan Docker image for vulnerabilities (trivy)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: omnipath:${{ github.sha }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

