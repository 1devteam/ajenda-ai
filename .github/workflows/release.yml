name: Release — Build & Publish

# Triggers on every merge to main.
# Reads the version from pyproject.toml, creates a git tag, builds the
# Docker image, and pushes it to GitHub Container Registry (GHCR).
on:
  push:
    branches: [main]

permissions:
  contents: write       # create tags and releases
  packages: write       # push to GHCR
  id-token: write       # OIDC token for provenance attestation

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Extract the version from pyproject.toml
  # ─────────────────────────────────────────────────────────────────────────
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from pyproject.toml
        id: extract
        run: |
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: ${VERSION}"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Create a git tag for this version (idempotent — skips if exists)
  # ─────────────────────────────────────────────────────────────────────────
  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag if not exists
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Build and push Docker image to GHCR
  # ─────────────────────────────────────────────────────────────────────────
  docker-publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [version, tag]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build provenance attestation for supply chain security
          provenance: true
          sbom: true

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Create a GitHub Release with auto-generated changelog
  # ─────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, docker-publish]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Release ${{ needs.version.outputs.tag }}"
          generate_release_notes: true
          draft: false
          prerelease: false
