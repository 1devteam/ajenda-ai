# Omnipath V2 Compliance Policy Configuration
# Version: 1.0
# 
# This file defines compliance policies for all agents in the Omnipath V2 platform.
# Policies are hot-reloadable and versioned for auditability.

version: "1.0"

# Metadata
metadata:
  created_at: "2026-02-26"
  author: "Obex Blackvault"
  description: "Production compliance policy for Omnipath V2"

# Agent-specific policies
agent_policies:
  researcher:
    allowed_tools:
      - web_search
      - calculator
    cost_limit_usd: 10.0
    rate_limits:
      web_search: 10  # calls per minute
    require_mission: true
  
  analyst:
    allowed_tools:
      - calculator
      - python_executor
    cost_limit_usd: 20.0
    rate_limits:
      python_executor: 5  # calls per minute
    require_mission: true
  
  developer:
    allowed_tools:
      - python_executor
      - file_reader
      - file_writer
    cost_limit_usd: 15.0
    rate_limits:
      python_executor: 5  # calls per minute
    require_mission: true

# Approval workflow policy
approval_required:
  enabled: true
  tools:
    - file_writer
    - database_query
    - api_caller
  paths:
    - /prod/
    - /production/
    - /config/
    - .env

# PII detection policy
pii_detection:
  enabled: true
  block_on_detection: true
  # Custom patterns (optional)
  patterns: {}

# Tenant isolation policy
tenant_isolation:
  enabled: true
  strict_mode: true
  tenant_scoped_tools:
    - file_reader
    - file_writer
    - database_query
