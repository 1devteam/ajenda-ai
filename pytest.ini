[pytest]
# Pytest configuration for Omnipath v4.5

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum version
minversion = 7.0

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --cov=backend
    --cov-report=html
    --cov-report=term-missing

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, requires services)
    e2e: End-to-end tests (full system)
    economy: Tests for agent economy system
    auth: Tests for authentication and authorization
    api: Tests for API endpoints
    slow: Tests that take a long time to run

# Asyncio configuration
asyncio_mode = auto

# Coverage options
[coverage:run]
source = backend
omit = 
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
