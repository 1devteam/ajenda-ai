# Citadel (OmniPath v2) — Staging Docker Compose
# Domain: nested-ai.net | HTTPS via Let's Encrypt
# All internal services port-locked — only nginx exposes 80/443
# Built with Pride for Obex Blackvault

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: citadel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnipath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-omnipath}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnipath}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - citadel-network

  # Redis (Caching)
  redis:
    image: redis:7-alpine
    container_name: citadel-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - citadel-network

  # NATS (Event Bus)
  nats:
    image: nats:2.10-alpine
    container_name: citadel-nats
    command:
      - "-js"
      - "-m"
      - "8222"
      - "--user"
      - "${NATS_USER:-omnipath}"
      - "--pass"
      - "${NATS_PASSWORD}"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - citadel-network

  # Jaeger (Distributed Tracing)
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: citadel-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: "10000"
    # Port 16686 is NOT exposed publicly — accessible via nginx /monitoring/jaeger/
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - citadel-network

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: citadel-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    # Port 9090 is NOT exposed publicly — accessible via nginx /monitoring/prometheus/
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - citadel-network

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:10.2.3
    container_name: citadel-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://nested-ai.net/monitoring/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    # Port 3000 is NOT exposed publicly — accessible via nginx /monitoring/grafana/
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - citadel-network

  # Citadel Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: citadel-backend
    # Port 8000 is NOT exposed publicly — all traffic routes through nginx
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnipath}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-omnipath}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_MAX_CONNECTIONS: 50

      # NATS
      NATS_URL: nats://${NATS_USER:-omnipath}:${NATS_PASSWORD}@nats:4222
      NATS_ENABLED: "true"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      PROMETHEUS_ENABLED: "true"

      # Security
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60

      # Rate Limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_PER_MINUTE: 60
      RATE_LIMIT_PER_HOUR: 1000

      # Application
      ENVIRONMENT: staging
      DEBUG: "false"
      LOG_LEVEL: INFO
      APP_NAME: Citadel
      APP_VERSION: 7.2.2

      # LLM
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    networks:
      - citadel-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Citadel Frontend (React SPA)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: citadel-frontend
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost/health.txt"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - citadel-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # Nginx (Reverse Proxy — HTTPS with Let's Encrypt)
  nginx:
    image: nginx:alpine
    container_name: citadel-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - citadel-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  citadel-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
